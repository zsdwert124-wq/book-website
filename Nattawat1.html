                                            <button onClick={() => processReturn(b.id, b.equipmentId, b.quantity)} className="px-4 py-2 bg-purple-600 text-white text-sm rounded-lg hover:bg-purple-700">ยืนยันรับคืน</button>
                                        )}
                                        {/* Admin Delete Button */}
                                        <button 
                                            onClick={() => promptDeleteBorrowing(b.id)}
                                            className="p-2 ml-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                            title="ลบรายการ"
                                        >
                                            <LucideTrash size={18} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const ReportsView = () => {
                const stats = useMemo(() => {
                    const totalBorrows = borrowings.length;
                    const overdue = borrowings.filter(b => b.status === 'อนุมัติ' && new Date(b.dueDate) < new Date()).length;
                    
                    // Popular items
                    const popular = borrowings.reduce((acc, curr) => {
                        acc[curr.equipmentName] = (acc[curr.equipmentName] || 0) + curr.quantity;
                        return acc;
                    }, {});
                    const sortedPopular = Object.entries(popular)
                        .map(([name, count]) => {
                            // Find all IDs associated with this book name
                            const ids = borrowings.filter(b => b.equipmentName === name).map(b => b.id);
                            return { name, count, ids };
                        })
                        .sort((a,b) => b.count - a.count)
                        .slice(0, 5);

                    // --- 1. Yearly Stats (Detailed) ---
                    const yearly = borrowings.reduce((acc, curr) => {
                        const date = new Date(curr.borrowDate);
                        const year = date.getFullYear() + 543; 
                        const key = `ปี ${year}`;
                        
                        if (!acc[key]) {
                            acc[key] = { count: 0, details: [], ids: [] };
                        }
                        acc[key].count += 1;
                        acc[key].ids.push(curr.id); // Collect IDs for group deletion
                        acc[key].details.push({
                            book: curr.equipmentName,
                            borrower: curr.borrowerName || 'ไม่ระบุชื่อ',
                            displayDate: date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }),
                            timestamp: date.getTime()
                        });
                        return acc;
                    }, {});
                    const sortedYearly = Object.entries(yearly)
                        .map(([key, val]) => {
                            val.details.sort((a, b) => b.timestamp - a.timestamp);
                            return { label: key, ...val };
                        })
                        .sort((a, b) => b.label.localeCompare(a.label));

                    // --- 2. Monthly Stats (Detailed) ---
                    const monthly = borrowings.reduce((acc, curr) => {
                        const date = new Date(curr.borrowDate);
                        const key = date.toLocaleString('th-TH', { month: 'long', year: 'numeric' });
                        const sortKey = date.getFullYear() * 100 + (date.getMonth() + 1);
                        
                        if (!acc[key]) {
                            acc[key] = { count: 0, sort: sortKey, details: [], ids: [] };
                        }
                        acc[key].count += 1;
                        acc[key].ids.push(curr.id); // Collect IDs
                        acc[key].details.push({
                            book: curr.equipmentName,
                            borrower: curr.borrowerName || 'ไม่ระบุชื่อ',
                            displayDate: date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' }),
                            timestamp: date.getTime()
                        });
                        return acc;
                    }, {});
                    const sortedMonthly = Object.entries(monthly)
                        .map(([key, val]) => {
                            val.details.sort((a, b) => b.timestamp - a.timestamp);
                            return { label: key, ...val };
                        })
                        .sort((a, b) => b.sort - a.sort);

                    // --- 3. Daily Stats (Detailed) ---
                    const daily = borrowings.reduce((acc, curr) => {
                        const date = new Date(curr.borrowDate);
                        const sortKey = date.toISOString().split('T')[0]; // YYYY-MM-DD
                        const label = date.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short', year: '2-digit' });
                        
                        if (!acc[sortKey]) {
                            acc[sortKey] = { count: 0, label, sortKey, details: [], ids: [] };
                        }
                        acc[sortKey].count += 1;
                        acc[sortKey].ids.push(curr.id); // Collect IDs
                        acc[sortKey].details.push({
                            book: curr.equipmentName,
                            borrower: curr.borrowerName || 'ไม่ระบุชื่อ',
                            time: date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                            timestamp: date.getTime()
                        });
                        return acc;
                    }, {});
                    const sortedDaily = Object.entries(daily)
                        .sort((a, b) => b[0].localeCompare(a[0])) // Sort by YYYY-MM-DD desc
                        .map(([key, val]) => {
                             val.details.sort((a, b) => b.timestamp - a.timestamp); // Sort details newest first
                             return val;
                        })
                        .slice(0, 7); // Show last 7 active days

                    return { totalBorrows, overdue, sortedPopular, sortedMonthly, sortedYearly, sortedDaily };
                }, [borrowings]);

                return (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800">รายงานสรุป</h2>
                        
                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-blue-50 p-6 rounded-xl border border-blue-100">
                                <h3 className="text-lg font-semibold text-blue-800 mb-2">สถิติรวม</h3>
                                <p className="text-3xl font-bold text-blue-600">{stats.totalBorrows} <span className="text-sm font-normal text-gray-600">รายการยืมทั้งหมด</span></p>
                            </div>
                            <div className="bg-red-50 p-6 rounded-xl border border-red-100">
                                <h3 className="text-lg font-semibold text-red-800 mb-2">เกินกำหนดคืน</h3>
                                <p className="text-3xl font-bold text-red-600">{stats.overdue} <span className="text-sm font-normal text-gray-600">รายการ</span></p>
                            </div>
                        </div>

                        {/* Top Row: Yearly & Daily */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Yearly Stats (Detailed) */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <LucideBookOpen size={20} className="text-orange-500"/> สถิติรายปี (Yearly)
                                </h3>
                                <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {stats.sortedYearly.length === 0 && <p className="text-gray-400 text-sm">ไม่มีข้อมูล</p>}
                                    {stats.sortedYearly.map((item) => (
                                        <div key={item.label} className="border rounded-lg p-3 bg-orange-50">
                                            <div className="flex justify-between items-center mb-3 border-b border-orange-200 pb-2 sticky top-0 bg-orange-50 z-10">
                                                <span className="text-gray-800 font-bold text-sm">{item.label}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className="bg-white text-orange-600 px-2 py-0.5 rounded text-xs font-bold shadow-sm">
                                                        {item.count} รายการ
                                                    </span>
                                                    <button 
                                                        onClick={() => promptDeleteGroup(item.ids, 'group_year')}
                                                        className="p-1 text-gray-400 hover:text-red-500 bg-white rounded shadow-sm hover:shadow transition-colors"
                                                        title="ลบประวัติปีนี้"
                                                    >
                                                        <LucideTrash size={14} />
                                                    </button>
                                                </div>
                                            </div>
                                            <ul className="space-y-2">
                                                {item.details.map((detail, idx) => (
                                                    <li key={idx} className="text-xs text-gray-600 py-1.5 border-b border-orange-100 last:border-0 hover:bg-white/50 rounded px-1 transition-colors">
                                                        <div className="flex items-center justify-between mb-1">
                                                            <span className="bg-orange-200 text-orange-800 px-1.5 py-0.5 rounded text-[10px] font-mono mr-2">
                                                                {detail.displayDate}
                                                            </span>
                                                            <span className="text-gray-500 text-[10px]">ผู้ยืม: {detail.borrower}</span>
                                                        </div>
                                                        <div className="font-medium text-gray-800 pl-1">
                                                            📖 {detail.book}
                                                        </div>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Daily Stats (Detailed) */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <FileText size={20} className="text-green-500"/> สถิติรายวัน (7 วันล่าสุด)
                                </h3>
                                <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {stats.sortedDaily.length === 0 && <p className="text-gray-400 text-sm">ไม่มีข้อมูล</p>}
                                    {stats.sortedDaily.map((item) => (
                                        <div key={item.sortKey} className="border rounded-lg p-3 bg-green-50">
                                            <div className="flex justify-between items-center mb-3 border-b border-green-200 pb-2 sticky top-0 bg-green-50 z-10">
                                                <span className="text-gray-800 font-bold text-sm">{item.label}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className="bg-white text-green-600 px-2 py-0.5 rounded text-xs font-bold shadow-sm">
                                                        {item.count} ครั้ง
                                                    </span>
                                                    <button 
                                                        onClick={() => promptDeleteGroup(item.ids, 'group_day')}
                                                        className="p-1 text-gray-400 hover:text-red-500 bg-white rounded shadow-sm hover:shadow transition-colors"
                                                        title="ลบประวัติวันนี้"
                                                    >
                                                        <LucideTrash size={14} />
                                                    </button>
                                                </div>
                                            </div>
                                            <ul className="space-y-2">
                                                {item.details.map((detail, idx) => (
                                                    <li key={idx} className="text-xs text-gray-600 py-1.5 border-b border-green-100 last:border-0 hover:bg-white/50 rounded px-1 transition-colors">
                                                        <div className="flex justify-between mb-1">
                                                            <span className="font-medium text-gray-700 truncate pr-2">📖 {detail.book}</span>
                                                            <span className="text-gray-400 text-[10px]">{detail.time} น.</span>
                                                        </div>
                                                        <div className="text-gray-500 text-[10px] pl-4 border-l-2 border-green-200">
                                                            ผู้ยืม: {detail.borrower}
                                                        </div>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Popular Items */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <LucideBookOpen size={20} className="text-blue-500"/> 5 อันดับหนังสือยอดนิยม
                                </h3>
                                <div className="space-y-3">
                                    {stats.sortedPopular.length === 0 && <p className="text-gray-400 text-sm">ไม่มีข้อมูล</p>}
                                    {stats.sortedPopular.map((item, idx) => (
                                        <div key={item.name} className="flex items-center gap-4 group">
                                            <span className="w-6 h-6 flex items-center justify-center bg-gray-100 rounded-full text-xs font-bold text-gray-600">{idx + 1}</span>
                                            <div className="flex-grow">
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="font-medium truncate pr-2">{item.name}</span>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-gray-500 text-xs whitespace-nowrap">{item.count} ครั้ง</span>
                                                        <button 
                                                            onClick={() => promptDeleteGroup(item.ids, 'top_popular')}
                                                            className="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
                                                            title="รีเซ็ตยอดนิยม"
                                                        >
                                                            <LucideTrash size={12} />
                                                        </button>
                                                    </div>
                                                </div>
                                                <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                                                    <div 
                                                        className="h-full bg-blue-500 rounded-full" 
                                                        style={{ width: `${(item.count / stats.sortedPopular[0].count) * 100}%` }}
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Monthly Stats (Detailed) */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <FileText size={20} className="text-purple-500"/> สถิติการยืมรายเดือน
                                </h3>
                                <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                    {stats.sortedMonthly.length === 0 && <p className="text-gray-400 text-sm">ไม่มีข้อมูลการยืม</p>}
                                    {stats.sortedMonthly.map((item) => (
                                        <div key={item.label} className="border rounded-lg p-3 bg-gray-50">
                                            <div className="flex justify-between items-center mb-3 border-b border-gray-200 pb-2 bg-white sticky top-0 z-10">
                                                <span className="text-gray-800 font-bold text-sm">{item.label}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-xs font-bold">
                                                        {item.count} รายการ
                                                    </span>
                                                    <button 
                                                        onClick={() => promptDeleteGroup(item.ids, 'group_month')}
                                                        className="p-1 text-gray-400 hover:text-red-500 bg-white rounded shadow-sm hover:shadow transition-colors"
                                                        title="ลบประวัติเดือนนี้"
                                                    >
                                                        <LucideTrash size={14} />
                                                    </button>
                                                </div>
                                            </div>
                                            <ul className="space-y-2">
                                                {item.details.map((detail, idx) => (
                                                    <li key={idx} className="text-xs text-gray-600 py-1.5 border-b border-gray-100 last:border-0 hover:bg-gray-100 rounded px-1 transition-colors">
                                                        <div className="flex items-center justify-between mb-1">
                                                            <span className="bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded text-[10px] font-mono mr-2">
                                                                {detail.displayDate}
                                                            </span>
                                                            <span className="text-gray-500 text-[10px]">ผู้ยืม: {detail.borrower}</span>
                                                        </div>
                                                        <div className="font-medium text-gray-800 pl-1">
                                                            📖 {detail.book}
                                                        </div>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            if (!authReady) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-500">กำลังโหลดข้อมูลจำลอง...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-gray-900 pb-20">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-40 px-4 py-3 shadow-sm">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg text-white">
                                    <LucideBookOpen size={24} />
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight text-blue-900">{siteConfig.title}</h1>
                                    <p className="text-xs text-slate-500">{siteConfig.subtitle}</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                {isSimulatedAdmin ? (
                                    <button onClick={() => setIsSimulatedAdmin(false)} className="text-xs text-red-600 font-medium hover:underline flex items-center gap-1">
                                        <LucideLogOut size={12} /> ออกจากระบบ Admin
                                    </button>
                                ) : (
                                    <button onClick={() => setShowAdminLoginModal(true)} className="text-xs text-slate-500 hover:text-blue-600 flex items-center gap-1">
                                        <LucideUser size={12} /> สำหรับเจ้าหน้าที่
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto p-4 sm:p-6">
                        
                        {/* User Info Card (Only for non-admin) */}
                        {!isSimulatedAdmin && (
                            <div className={`bg-white rounded-xl shadow-sm border p-4 mb-6 transition-colors ${!isUserInfoComplete ? 'border-orange-200 bg-orange-50' : 'border-gray-200'}`}>
                                <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                                    <LucideUser size={16} /> ข้อมูลผู้ยืม {isUserInfoComplete ? <span className="text-green-600 text-xs font-normal">(ครบถ้วน)</span> : <span className="text-red-500 text-xs font-normal">* จำเป็น</span>}
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                    <input 
                                        type="text" 
                                        placeholder="ชื่อ-นามสกุล" 
                                        className="border p-2 rounded-lg text-sm"
                                        value={borrowerName}
                                        onChange={e => setBorrowerName(e.target.value)}
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="รหัสนักศึกษา/พนักงาน" 
                                        className="border p-2 rounded-lg text-sm"
                                        value={studentId}
                                        onChange={e => setStudentId(e.target.value)}
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="ห้อง/แผนก" 
                                        className="border p-2 rounded-lg text-sm"
                                        value={className}
                                        onChange={e => setClassName(e.target.value)}
                                    />
                                </div>
                            </div>
                        )}

                        {/* Navigation Tabs */}
                        <div className="flex overflow-x-auto gap-2 mb-6 pb-2 scrollbar-hide">
                            <NavButton id="dashboard" icon={LucideLayoutDashboard} label="ยืมอุปกรณ์" />
                            <NavButton id="history" icon={LucideHistory} label="ประวัติ" />
                            {isSimulatedAdmin && (
                                <>
                                    <div className="w-px bg-gray-300 mx-2"></div>
                                    <NavButton id="admin_approve" icon={LucideClipboardList} label="งานอนุมัติ" badge={pendingCount} />
                                    <NavButton id="admin_manage" icon={LucideSettings} label="จัดการของ" />
                                    <NavButton id="admin_users" icon={LucideUsers} label="ผู้ใช้งาน" />
                                    <NavButton id="admin_security" icon={ShieldCheck} label="ความปลอดภัย" />
                                    <NavButton id="reports" icon={LucideBookOpen} label="รายงาน" />
                                </>
                            )}
                        </div>

                        {/* View Renderer */}
                        <div className="animate-fade-in">
                            {currentView === 'dashboard' && <DashboardView onBorrow={setBorrowModalItem} />}
                            {currentView === 'history' && <HistoryView />}
                            {currentView === 'admin_manage' && <AdminManageView onEdit={setEditModalItem} />}
                            {currentView === 'admin_approve' && <AdminApproveView />}
                            {currentView === 'admin_users' && <AdminUsersView />}
                            {currentView === 'admin_security' && <AdminSecurityView />}
                            {currentView === 'reports' && <ReportsView />}
                        </div>

                    </main>

                    {/* Modals & Toast */}
                    {showAdminLoginModal && <AdminLoginModal onLogin={handleAdminLogin} onClose={() => setShowAdminLoginModal(false)} />}
                    {showWelcome && <WelcomeScreen onClose={() => setShowWelcome(false)} />}
                    {showAdminWelcome && <AdminWelcomeModal onClose={() => setShowAdminWelcome(false)} />}
                    {itemToDelete && <DeleteConfirmModal item={itemToDelete} onConfirm={confirmDelete} onCancel={() => setItemToDelete(null)} />}
                    {toast && <Toast message={toast} />}

                    {/* Borrow Modal */}
                    {borrowModalItem && (
                        <BorrowModal 
                            item={borrowModalItem} 
                            onClose={() => setBorrowModalItem(null)} 
                            onConfirm={(qty, dueDate) => {
                                requestBorrow(borrowModalItem.id, qty, dueDate);
                                setBorrowModalItem(null);
                            }}
                        />
                    )}

                    {/* Edit Modal */}
                    {editModalItem && (
                        <EditEquipmentModal 
                            item={editModalItem} 
                            onClose={() => setEditModalItem(null)} 
                            onSave={(data) => {
                                saveEquipment(data, data.id === 'new' ? null : data.id);
                                setEditModalItem(null);
                            }}
                        />
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
