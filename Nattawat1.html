        // --- Main Component ---
        const App = () => {
            // Local Data States
            const [equipments, setEquipments] = useState([]);
            const [borrowings, setBorrowings] = useState([]);
            const [users, setUsers] = useState([]); 
            const [logs, setLogs] = useState([]); 
            // Update default site config
            const [siteConfig, setSiteConfig] = useState({ 
                title: 'เว็บไซต์ยืมหนังสือ', 
                subtitle: 'ออนไลน์' 
            });
            const [userId, setUserId] = useState('demo-user-id');
            const [authReady, setAuthReady] = useState(false);
            const [showWelcome, setShowWelcome] = useState(true);
            const [showAdminWelcome, setShowAdminWelcome] = useState(false);
            
            // App States
            const [isSimulatedAdmin, setIsSimulatedAdmin] = useState(false);
            const [currentView, setCurrentView] = useState('dashboard');
            const [itemToDelete, setItemToDelete] = useState(null); 
            const [toast, setToast] = useState(null); // Toast state
            const [borrowModalItem, setBorrowModalItem] = useState(null); // Lifted state for Borrow Modal
            const [editModalItem, setEditModalItem] = useState(null); // Lifted state for Edit Modal
            
            // User Info States
            const [borrowerName, setBorrowerName] = useState(''); 
            const [studentId, setStudentId] = useState(''); 
            const [className, setClassName] = useState('');
            
            const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);

            // --- Initialization ---
            useEffect(() => {
                setTimeout(() => {
                    const savedEquipments = localStorage.getItem('equipments');
                    const savedBorrowings = localStorage.getItem('borrowings');
                    const savedUsers = localStorage.getItem('users');
                    const savedLogs = localStorage.getItem('systemLogs');
                    const savedConfig = localStorage.getItem('siteConfig');

                    if (savedEquipments) {
                        setEquipments(JSON.parse(savedEquipments));
                    } else {
                        const defaults = [...SPORTS_EQUIPMENT_DEFAULTS, ...BOOK_DEFAULTS].map(i => ({...i, status: 'ว่าง'}));
                        setEquipments(defaults);
                        localStorage.setItem('equipments', JSON.stringify(defaults));
                    }

                    if (savedBorrowings) {
                        setBorrowings(JSON.parse(savedBorrowings));
                    }

                    if (savedUsers) {
                        setUsers(JSON.parse(savedUsers));
                    } else if (savedBorrowings) {
                        const borrowingsData = JSON.parse(savedBorrowings);
                        const uniqueUsers = {};
                        borrowingsData.forEach(b => {
                            if (b.studentId && !uniqueUsers[b.studentId]) {
                                uniqueUsers[b.studentId] = {
                                    studentId: b.studentId,
                                    name: b.borrowerName,
                                    className: b.className,
                                    role: 'user',
                                    status: 'active'
                                };
                            }
                        });
                        const initialUsers = Object.values(uniqueUsers);
                        setUsers(initialUsers);
                        localStorage.setItem('users', JSON.stringify(initialUsers));
                    }

                    if (savedLogs) {
                        setLogs(JSON.parse(savedLogs));
                    }

                    if (savedConfig) {
                        setSiteConfig(JSON.parse(savedConfig));
                    }

                    setAuthReady(true);
                }, 800);
            }, []);

            // --- Real-time Sync across tabs ---
            useEffect(() => {
                const handleStorageChange = (e) => {
                    // When LocalStorage changes in another tab, update state here
                    if (e.key === 'borrowings') {
                        setBorrowings(JSON.parse(e.newValue || '[]'));
                    } else if (e.key === 'equipments') {
                        setEquipments(JSON.parse(e.newValue || '[]'));
                    } else if (e.key === 'users') {
                        setUsers(JSON.parse(e.newValue || '[]'));
                    } else if (e.key === 'systemLogs') {
                        setLogs(JSON.parse(e.newValue || '[]'));
                    } else if (e.key === 'siteConfig') {
                        setSiteConfig(JSON.parse(e.newValue || '{}'));
                    }
                };

                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, []);

            // --- Show Toast Helper ---
            const showToast = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 3000);
            };

            // --- Helper to Save Data ---
            const saveToLocal = (key, data, silent = false) => {
                localStorage.setItem(key, JSON.stringify(data));
                if (key === 'equipments') setEquipments(data);
                if (key === 'borrowings') setBorrowings(data);
                if (key === 'users') setUsers(data);
                if (key === 'systemLogs') setLogs(data);
                if (key === 'siteConfig') setSiteConfig(data);
                
                if (!silent && key !== 'systemLogs') { 
                    showToast('บันทึกข้อมูลเรียบร้อยแล้ว');
                }
            };

            // --- Logger Function ---
            const addLog = (action, actor, details) => {
                const newLog = {
                    id: 'log_' + Date.now(),
                    timestamp: new Date().toISOString(),
                    action,
                    actor,
                    details
                };
                const updatedLogs = [newLog, ...logs].slice(0, 200);
                saveToLocal('systemLogs', updatedLogs, true); // Silent save for logs
            };

            const fullBorrowerId = useMemo(() => {
                const parts = [];
                if (borrowerName.trim()) parts.push(borrowerName.trim());
                if (studentId.trim()) parts.push(`รหัส:${studentId.trim()}`);
                if (className.trim()) parts.push(`ห้อง:${className.trim()}`);
                return parts.join(' | ');
            }, [borrowerName, studentId, className]);

            const isUserInfoComplete = borrowerName.trim() && studentId.trim() && className.trim();

            const pendingCount = useMemo(() => {
                return borrowings.filter(b => b.status === 'รออนุมัติ' || b.status === 'รอการตรวจสอบคืน').length;
            }, [borrowings]);

            // --- Actions ---
            const handleAdminLogin = (password, setError) => {
                if (password === '124') {
                    setIsSimulatedAdmin(true);
                    setShowAdminLoginModal(false);
                    setError('');
                    addLog('เข้าสู่ระบบ', 'Admin', 'เข้าสู่ระบบผู้ดูแล');
                    setShowAdminWelcome(true);
                } else {
                    setError('รหัสผ่านไม่ถูกต้อง');
                }
            };

            const updateSiteConfig = (newConfig) => {
                saveToLocal('siteConfig', newConfig);
                // addLog('ตั้งค่าระบบ', 'Admin', 'แก้ไขชื่อ/รายละเอียดเว็บไซต์'); // Optional log
            };

            const upsertUser = (uId, uName, uClass) => {
                const existingUser = users.find(u => u.studentId === uId);
                let newUsersList = [];
                if (existingUser) {
                    newUsersList = users.map(u => u.studentId === uId ? { ...u, name: uName, className: uClass } : u);
                } else {
                    newUsersList = [...users, { 
                        studentId: uId, 
                        name: uName, 
                        className: uClass, 
                        role: 'user', 
                        status: 'active',
                        joinedDate: new Date().toISOString()
                    }];
                }
                saveToLocal('users', newUsersList);
            };

            const requestBorrow = (equipmentId, qty, dueDate) => {
                const sId = studentId.trim();
                const uName = borrowerName.trim();
                const uClass = className.trim();

                const user = users.find(u => u.studentId === sId);
                if (user && user.status === 'suspended') {
                    alert(`❌ ไม่สามารถทำรายการได้\nผู้ใช้รหัส ${sId} ถูกระงับการใช้งาน\nกรุณาติดต่อผู้ดูแลระบบ`);
                    addLog('พยายามยืม (ถูกระงับ)', uName, `พยายามยืมสินค้า ID: ${equipmentId}`);
                    return;
                }

                const updatedEquipments = [...equipments];
                const equipmentIndex = updatedEquipments.findIndex(e => e.id === equipmentId);
                if (equipmentIndex === -1) return;
                const equipment = updatedEquipments[equipmentIndex];
                if (equipment.available < qty) return;

                upsertUser(sId, uName, uClass);

                const newBorrow = {
                    id: 'bor_' + Date.now(),
                    equipmentId,
                    equipmentName: equipment.name,
                    userId,
                    userName: fullBorrowerId,
                    borrowerName: uName,
                    studentId: sId,
                    className: uClass,
                    borrowDate: new Date().toISOString(),
                    dueDate: new Date(dueDate).toISOString(),
                    quantity: Number(qty),
                    status: 'รออนุมัติ',
                    returnDate: null
                };

                const updatedBorrowings = [...borrowings, newBorrow];
                saveToLocal('borrowings', updatedBorrowings, true); // Silent save here, show custom toast instead
                showToast('✅ ส่งคำขอยืมเรียบร้อย กรุณารอการอนุมัติ');
                addLog('ยืมอุปกรณ์', uName, `ขอเช่า ${equipment.name} จำนวน ${qty} ชิ้น`);
            };

            const toggleUserStatus = (targetStudentId) => {
                let action = '';
                const updatedUsers = users.map(u => {
                    if (u.studentId === targetStudentId) {
                        const newStatus = u.status === 'active' ? 'suspended' : 'active';
                        action = newStatus === 'active' ? 'ยกเลิกการระงับ' : 'ระงับผู้ใช้';
                        return { ...u, status: newStatus };
                    }
                    return u;
                });
                saveToLocal('users', updatedUsers);
                addLog(action, 'Admin', `จัดการสถานะผู้ใช้ ${targetStudentId}`);
            };

            const toggleUserRole = (targetStudentId) => {
                let role = '';
                const updatedUsers = users.map(u => {
                    if (u.studentId === targetStudentId) {
                        const newRole = u.role === 'admin' ? 'user' : 'admin';
                        role = newRole;
                        return { ...u, role: newRole };
                    }
                    return u;
                });
                saveToLocal('users', updatedUsers);
                addLog('เปลี่ยนสิทธิ์', 'Admin', `เปลี่ยนสิทธิ์ผู้ใช้ ${targetStudentId} เป็น ${role}`);
            };

            const approveBorrow = (borrowingId, equipmentId, qty) => {
                const updatedEquipments = equipments.map(eq => {
                    if (eq.id === equipmentId) {
                        const newAvail = eq.available - qty;
                        return { 
                            ...eq, 
                            available: newAvail, 
                            status: newAvail > 0 ? 'ว่าง' : 'ถูกยืม'
                        };
                    }
                    return eq;
                });

                const updatedBorrowings = borrowings.map(bor => {
                    if (bor.id === borrowingId) {
                        return { ...bor, status: 'อนุมัติ', adminNote: `Approved: ${new Date().toLocaleString()}` };
                    }
                    return bor;
                });

                saveToLocal('equipments', updatedEquipments);
                saveToLocal('borrowings', updatedBorrowings);
                addLog('อนุมัติการยืม', 'Admin', `อนุมัติรายการ ID: ${borrowingId}`);
            };

            const processReturn = (borrowingId, equipmentId, qty) => {
                const updatedEquipments = equipments.map(eq => {
                    if (eq.id === equipmentId) {
                        const newAvail = eq.available + qty;
                        return { 
                            ...eq, 
                            available: newAvail, 
                            status: newAvail > 0 ? 'ว่าง' : 'ถูกยืม' 
                        };
                    }
                    return eq;
                });

                const updatedBorrowings = borrowings.map(bor => {
                    if (bor.id === borrowingId) {
                        return { 
                            ...bor, 
                            status: 'คืนแล้ว', 
                            returnDate: new Date().toISOString(),
                            adminNote: `Returned: ${new Date().toLocaleString()}`
                        };
                    }
                    return bor;
                });

                saveToLocal('equipments', updatedEquipments);
                saveToLocal('borrowings', updatedBorrowings);
                addLog('รับคืนอุปกรณ์', 'Admin', `รับคืนรายการ ID: ${borrowingId}`);
            };

            const cancelBorrow = (borrowingId) => {
                const updatedBorrowings = borrowings.map(bor => {
                    if (bor.id === borrowingId) {
                        return { ...bor, status: 'ยกเลิก', adminNote: 'Cancelled by Admin' };
                    }
                    return bor;
                });
                saveToLocal('borrowings', updatedBorrowings);
                addLog('ปฏิเสธ/ยกเลิก', 'Admin', `ยกเลิกรายการ ID: ${borrowingId}`);
            };

            const signalReturn = (borrowingId) => {
                const updatedBorrowings = borrowings.map(bor => {
                    if (bor.id === borrowingId) {
                        return { ...bor, status: 'รอการตรวจสอบคืน' };
                    }
                    return bor;
                });
                saveToLocal('borrowings', updatedBorrowings);
                addLog('แจ้งคืน', 'User', `แจ้งคืนรายการ ID: ${borrowingId}`);
            };

            // --- Delete Actions ---
            const promptDeleteLog = (logId) => { setItemToDelete({ type: 'log', id: logId }); };
            const promptClearLogs = () => { setItemToDelete({ type: 'all_logs' }); };
            const promptDeleteBorrowing = (borrowingId) => { setItemToDelete({ type: 'borrowing', id: borrowingId }); };
            const promptDeleteAllHistory = (itemsToDelete) => { setItemToDelete({ type: 'all_history', ids: itemsToDelete }); };
            const promptDeleteUser = (studentId) => { setItemToDelete({ type: 'user', id: studentId }); };
            const promptDeleteEquipment = (equipmentId) => { setItemToDelete({ type: 'equipment', id: equipmentId }); };
            const promptDeleteGroup = (itemsToDelete, type) => { setItemToDelete({ type, ids: itemsToDelete }); };

            const confirmDelete = () => {
                if (!itemToDelete) return;

                if (itemToDelete.type === 'borrowing') {
                    const updatedBorrowings = borrowings.filter(bor => bor.id !== itemToDelete.id);
                    saveToLocal('borrowings', updatedBorrowings);
                    addLog('ลบประวัติ', isSimulatedAdmin ? 'Admin' : 'User', `ลบรายการยืม ID: ${itemToDelete.id}`);
                } else if (itemToDelete.type === 'all_history' || itemToDelete.type.startsWith('group_')) {
                    const idsToDelete = new Set(itemToDelete.ids);
                    const remaining = borrowings.filter(b => !idsToDelete.has(b.id));
                    saveToLocal('borrowings', remaining);
                    addLog('ลบกลุ่มประวัติ', isSimulatedAdmin ? 'Admin' : 'User', `ลบประวัติ ${itemToDelete.ids.length} รายการ`);
                } else if (itemToDelete.type === 'user') {
                    const updatedUsers = users.filter(u => u.studentId !== itemToDelete.id);
                    saveToLocal('users', updatedUsers);
                    addLog('ลบผู้ใช้', 'Admin', `ลบผู้ใช้รหัส: ${itemToDelete.id}`);
                } else if (itemToDelete.type === 'log') {
                    const updatedLogs = logs.filter(l => l.id !== itemToDelete.id);
                    saveToLocal('systemLogs', updatedLogs);
                } else if (itemToDelete.type === 'all_logs') {
                    saveToLocal('systemLogs', []);
                    setTimeout(() => addLog('ล้างบันทึก', 'Admin', 'ล้างประวัติการใช้งานทั้งหมด'), 100);
                } else if (itemToDelete.type === 'equipment') {
                    const item = equipments.find(e => e.id === itemToDelete.id);
                    const updatedEquipments = equipments.filter(e => e.id !== itemToDelete.id);
                    saveToLocal('equipments', updatedEquipments);
                    addLog('ลบอุปกรณ์', 'Admin', `ลบรายการ: ${item ? item.name : itemToDelete.id}`);
                } else if (itemToDelete.type === 'top_popular') {
                     // Deleting borrowing history for specific books in Top 5 list
                     const idsToDelete = new Set(itemToDelete.ids);
                     const remaining = borrowings.filter(b => !idsToDelete.has(b.id));
                     saveToLocal('borrowings', remaining);
                     addLog('รีเซ็ตยอดนิยม', 'Admin', `ลบประวัติการยืมของหนังสือยอดนิยม`);
                }

                setItemToDelete(null); 
            };

            const saveEquipment = (data, id = null) => {
                const payload = {
                    ...data,
                    quantity: Number(data.quantity),
                    available: Number(data.available),
                    status: Number(data.available) > 0 ? 'ว่าง' : 'ถูกยืม',
                    imageUrl: data.imageUrl || 'https://placehold.co/100x100/3B82F6/ffffff?text=Item'
                };

                let updatedEquipments;
                if (id) {
                    updatedEquipments = equipments.map(e => e.id === id ? { ...e, ...payload } : e);
                    addLog('แก้ไขอุปกรณ์', 'Admin', `แก้ไขข้อมูล: ${data.name}`);
                } else {
                    updatedEquipments = [...equipments, { id: 'eq_' + Date.now(), ...payload }];
                    addLog('เพิ่มอุปกรณ์', 'Admin', `เพิ่มใหม่: ${data.name}`);
                }
                saveToLocal('equipments', updatedEquipments);
            };
            
            const resetData = () => {
                if(confirm('คุณต้องการรีเซ็ตข้อมูลทั้งหมดกลับเป็นค่าเริ่มต้นหรือไม่? ข้อมูลการยืมและ Logs จะหายไปทั้งหมด')) {
                    localStorage.removeItem('equipments');
                    localStorage.removeItem('borrowings');
                    localStorage.removeItem('users');
                    localStorage.removeItem('systemLogs');
                    window.location.reload();
                }
            };

            // --- Sub-Components ---
            
            const Toast = ({ message }) => (
                <div className="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 animate-slide-up z-50">
                    <CheckCircle size={20} className="text-green-400" />
                    <span>{message}</span>
                </div>
            );

            const AdminLoginModal = ({ onLogin, onClose }) => {
                const [pass, setPass] = useState('');
                const [err, setErr] = useState('');
                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                            <h3 className="text-xl font-bold mb-2 text-gray-800">ยินดีต้อนรับผู้ดูแลระบบ</h3>
                            <p className="text-sm text-gray-500 mb-6">กรุณากรอกรหัสผ่านเพื่อเข้าถึงระบบจัดการ</p>
                            <input 
                                type="password" 
                                value={pass}
                                onChange={(e) => { setPass(e.target.value); setErr(''); }}
                                className="w-full p-3 border rounded-xl mb-2"
                                placeholder="รหัสผ่าน"
                            />
                            {err && <p className="text-red-500 text-sm mb-3">{err}</p>}
                            <div className="flex gap-2">
                                <button onClick={onClose} className="flex-1 py-2 bg-gray-200 rounded-lg">ยกเลิก</button>
                                <button onClick={() => onLogin(pass, setErr)} className="flex-1 py-2 bg-blue-600 text-white rounded-lg">ยืนยัน</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const AdminWelcomeModal = ({ onClose }) => (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] animate-fade-in">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4 relative">
                        <button 
                            onClick={onClose}
                            className="absolute top-2 right-2 text-gray-400 hover:text-gray-600"
                        >
                            &times;
                        </button>
                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <ShieldCheck size={32} />
                        </div>
                        <h2 className="text-xl font-bold text-gray-800 mb-2">ยินดีต้อนรับผู้ดูแลระบบ</h2>
                        <p className="text-gray-600 mb-6">คุณได้เข้าสู่โหมดจัดการระบบเรียบร้อยแล้ว</p>
                        <button 
                            onClick={onClose}
                            className="w-full py-2.5 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition"
                        >
                            ตกลง
                        </button>
                    </div>
                </div>
            );

            const WelcomeScreen = ({ onClose }) => (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] animate-fade-in">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-md mx-4">
                        <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <LucideBookOpen size={40} />
                        </div>
                        <h1 className="text-2xl font-bold text-gray-800 mb-2">ยินดีต้อนรับ</h1>
                        <p className="text-gray-600 mb-8">สู่เว็บไซต์ยืม-หนังสือออนไลน์<br/>ระบบจองและจัดการที่มีประสิทธิภาพ</p>
                        <button 
                            onClick={onClose}
                            className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 transition-transform hover:scale-[1.02]"
                        >
                            เข้าสู่เว็บไซต์
                        </button>
                    </div>
                </div>
            );

            const DeleteConfirmModal = ({ item, onConfirm, onCancel }) => (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center">
                        <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <AlertTriangle size={32} />
                        </div>
                        <h3 className="text-xl font-bold mb-2 text-gray-800">ยืนยันการลบ</h3>
                        <p className="text-gray-600 mb-6">
                            {item.type.startsWith('group_') || item.type === 'all_history' || item.type === 'top_popular'
                                ? `คุณต้องการลบประวัติจำนวน ${item.ids.length} รายการ ใช่หรือไม่?` 
                                : item.type === 'user' 
                                    ? `คุณต้องการลบผู้ใช้รหัส ${item.id} ใช่หรือไม่?`
                                    : item.type === 'all_logs'
                                        ? 'คุณต้องการล้างบันทึกการใช้งานทั้งหมดใช่หรือไม่?'
                                        : item.type === 'equipment'
                                            ? 'คุณต้องการลบอุปกรณ์นี้ใช่หรือไม่?'
                                            : 'คุณต้องการลบรายการนี้ใช่หรือไม่?'}
                            <br/><span className="text-xs text-red-500">การกระทำนี้ไม่สามารถเรียกคืนได้</span>
                        </p>
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">ยกเลิก</button>
                            <button onClick={onConfirm} className="flex-1 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium shadow-md">ลบถาวร</button>
                        </div>
                    </div>
                </div>
            );

            const NavButton = ({ id, icon: Icon, label, badge }) => (
                <button 
                    onClick={() => setCurrentView(id)}
                    className={`relative flex items-center gap-2 px-4 py-2 rounded-lg transition-colors ${
                        currentView === id ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'
                    }`}
                >
                    <Icon size={18} />
                    <span className="hidden sm:inline">{label}</span>
                    {badge > 0 && (
                        <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-sm animate-badge">
                            {badge > 99 ? '99+' : badge}
                        </span>
                    )}
                </button>
            );

            // Borrow Modal Component
            const BorrowModal = ({ item, onClose, onConfirm }) => {
                const [qty, setQty] = useState(1);
                const [dueDate, setDueDate] = useState('');
                
                useEffect(() => {
                    const d = new Date();
                    d.setDate(d.getDate() + 7);
                    // Local timezone adjust
                    const offset = d.getTimezoneOffset() * 60000;
                    setDueDate(new Date(d - offset).toISOString().slice(0, 16));
                }, []);

                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 animate-fade-in">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
                            <h3 className="text-xl font-bold mb-4">ขอยืม: {item.name}</h3>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">กำหนดคืน</label>
                                    <input 
                                        type="datetime-local" 
                                        value={dueDate}
                                        onChange={e => setDueDate(e.target.value)}
                                        className="w-full p-2 border rounded-lg"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">จำนวน (เหลือ {item.available})</label>
                                    <input 
                                        type="number" 
                                        min="1" 
                                        max={item.available} 
                                        value={qty} 
                                        onChange={e => setQty(Math.min(item.available, Math.max(1, Number(e.target.value))))}
                                        className="w-full p-2 border rounded-lg"
                                    />
                                </div>
                            </div>
                            <div className="flex gap-2 mt-6">
                                <button onClick={onClose} className="flex-1 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">ยกเลิก</button>
                                <button 
                                    onClick={() => onConfirm(qty, dueDate)} 
                                    className="flex-1 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                >
                                    ยืนยัน
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const EditEquipmentModal = ({ item, onClose, onSave }) => {
                const [formData, setFormData] = useState(item);

                const handleImageUpload = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        if (file.size > 500000) {
                            alert('กรุณาใช้รูปภาพขนาดไม่เกิน 500KB');
                            return;
                        }
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            setFormData({ ...formData, imageUrl: reader.result });
                        };
                        reader.readAsDataURL(file);
                    }
                };

                const handleSubmit = (e) => {
                    e.preventDefault();
                    onSave(formData);
                };

                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto scrollbar-hide">
                            <h3 className="text-xl font-bold mb-4">{item.id === 'new' ? 'เพิ่มรายการ' : 'แก้ไขรายการ'}</h3>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                
                                {/* Image Upload / Preview Section */}
                                <div className="space-y-2">
                                    <label className="block text-sm font-medium text-gray-700">รูปภาพอุปกรณ์</label>
                                    <div className="flex gap-4 items-start">
                                        <div className="w-24 h-24 bg-gray-100 rounded-lg border flex items-center justify-center overflow-hidden shrink-0 relative group">
                                            <img 
                                                src={formData.imageUrl || 'https://placehold.co/100x100/e2e8f0/64748b?text=No+Img'} 
                                                alt="Preview" 
                                                className="w-full h-full object-contain"
                                                onError={(e) => e.target.src = 'https://placehold.co/100x100/e2e8f0/64748b?text=Error'} 
                                            />
                                            {/* Upload Overlay */}
                                            <label className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                                                <Upload size={20} />
                                                <span className="text-[10px] mt-1">เปลี่ยนรูป</span>
                                                <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                            </label>
                                        </div>
                                        <div className="flex-grow space-y-2">
                                            <input 
                                                className="w-full border p-2 rounded text-sm" 
                                                value={formData.imageUrl} 
                                                onChange={e => setFormData({...formData, imageUrl: e.target.value})} 
                                                placeholder="วางลิงก์รูปภาพ (URL)"
                                            />
                                            <p className="text-xs text-gray-500">
                                                * อัปโหลดรูป (ไม่เกิน 500KB) โดยคลิกที่รูปด้านซ้าย หรือวาง URL ในช่องว่าง
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm mb-1">ชื่อ</label>
                                        <input className="w-full border p-2 rounded" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-1">ประเภท</label>
                                        <input 
                                            className="w-full border p-2 rounded" 
                                            list="typeOptions" 
                                            value={formData.type} 
                                            onChange={e => setFormData({...formData, type: e.target.value})} 
                                            placeholder="เลือกหรือพิมพ์เอง" 
                                            required 
                                        />
                                        <datalist id="typeOptions">
                                            <option value="แบบเรียน" />
                                            <option value="วรรณกรรม" />
                                            <option value="เทคโนโลยี" />
                                            <option value="พัฒนาตนเอง" />
                                            <option value="การ์ตูนความรู้" />
                                            <option value="ทั่วไป" />
                                            <option value="ประวัติศาสตร์" />
                                            <option value="นิยายสืบสวน" />
                                            <option value="นิยายจีน" />
                                            <option value="สุขภาพ" />
                                        </datalist>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm mb-1">จำนวนทั้งหมด</label>
                                        <input type="number" className="w-full border p-2 rounded" required value={formData.quantity} onChange={e => setFormData({...formData, quantity: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-1">คงเหลือ</label>
                                        <input type="number" className="w-full border p-2 rounded" required value={formData.available} onChange={e => setFormData({...formData, available: e.target.value})} />
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm mb-1">รายละเอียด</label>
                                    <textarea className="w-full border p-2 rounded" rows="2" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                </div>
                                <div className="flex gap-2 pt-4 border-t mt-4">
                                    <button type="button" onClick={onClose} className="flex-1 py-2 bg-gray-100 rounded-lg text-gray-700 hover:bg-gray-200">ยกเลิก</button>
                                    <button type="submit" className="flex-1 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2">
                                        <LucideSave size={18} /> บันทึกข้อมูล
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            // --- Views ---

            const DashboardView = ({ onBorrow }) => {
                const [search, setSearch] = useState('');
                const [filter, setFilter] = useState('ทั้งหมด');

                const uniqueTypes = useMemo(() => {
                    const types = new Set(equipments.map(e => e.type));
                    types.add('แบบเรียน');
                    types.add('วรรณกรรม');
                    types.add('เทคโนโลยี');
                    types.add('พัฒนาตนเอง');
                    types.add('การ์ตูนความรู้');
                    types.add('ประวัติศาสตร์'); 
                    types.add('นิยายสืบสวน'); 
                    types.add('นิยายจีน'); 
                    types.add('สุขภาพ'); 
                    return ['ทั้งหมด', ...Array.from(types)].filter(Boolean);
                }, [equipments]);

                const filtered = equipments.filter(e => {
                    const matchesSearch = e.name.toLowerCase().includes(search.toLowerCase());
                    const matchesType = filter === 'ทั้งหมด' || e.type === filter;
                    return matchesSearch && matchesType;
                }).sort((a,b) => (b.available > 0) - (a.available > 0)); 

                return (
                    <div className="space-y-6">
                        {/* Filters */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row gap-4">
                            <div className="relative flex-grow">
                                <LucideSearch className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                                <input 
                                    type="text" 
                                    placeholder="ค้นหาอุปกรณ์..." 
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                            <select 
                                value={filter} 
                                onChange={(e) => setFilter(e.target.value)}
                                className="px-4 py-2 border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                {uniqueTypes.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </div>

                        {/* Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {filtered.map(item => (
                                <EquipmentCard key={item.id} item={item} onBorrow={onBorrow} />
                            ))}
                            {filtered.length === 0 && (
                                <div className="col-span-full text-center py-12 text-gray-400">
                                    ไม่พบรายการที่ค้นหา
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const EquipmentCard = ({ item, onBorrow }) => {
                const canBorrow = item.available > 0;

                return (
                    <>
                        <div className={`bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col h-full transition-shadow hover:shadow-md ${!canBorrow ? 'opacity-70' : ''}`}>
                            <div className="relative aspect-video bg-gray-100">
                                <img 
                                    src={item.imageUrl} 
                                    alt={item.name}
                                    className="w-full h-full object-contain p-4"
                                    onError={(e) => e.target.src = 'https://placehold.co/100x100/e2e8f0/64748b?text=No+Image'}
                                />
                                <span className={`absolute top-2 right-2 px-2 py-1 text-xs font-bold rounded-full ${canBorrow ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                    {canBorrow ? `ว่าง ${item.available}` : 'หมด'}
                                </span>
                            </div>
                            <div className="p-4 flex-grow flex flex-col">
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <h3 className="font-bold text-gray-800 line-clamp-1">{item.name}</h3>
                                        <p className="text-xs text-gray-500">{item.type}</p>
                                    </div>
                                </div>
                                <p className="text-sm text-gray-600 line-clamp-2 mb-4 flex-grow">{item.description}</p>
                                <button 
                                    onClick={() => onBorrow(item)}
                                    disabled={!canBorrow || !isUserInfoComplete}
                                    className={`w-full py-2 rounded-lg text-sm font-semibold transition-colors ${
                                        !isUserInfoComplete 
                                            ? 'bg-gray-100 text-gray-400 cursor-not-allowed'
                                            : canBorrow 
                                                ? 'bg-blue-600 text-white hover:bg-blue-700' 
                                                : 'bg-gray-200 text-gray-500 cursor-not-allowed'
                                    }`}
                                >
                                    {!isUserInfoComplete ? 'กรอกข้อมูลผู้ยืมก่อน' : canBorrow ? 'ยืมรายการนี้' : 'ของหมด'}
                                </button>
                            </div>
                        </div>
                    </>
                );
            };

            const HistoryView = () => {
                const [search, setSearch] = useState('');

                // --- เพิ่มการตรวจสอบ: ถ้าไม่ใช่ Admin และข้อมูลไม่ครบ ให้แสดงข้อความเตือน ---
                if (!isSimulatedAdmin && !isUserInfoComplete) {
                    return (
                        <div className="flex flex-col items-center justify-center p-12 bg-white rounded-xl shadow-sm border-2 border-dashed border-gray-300 text-center animate-fade-in">
                            <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                                <LucideUser size={40} className="text-gray-400" />
                            </div>
                            <h3 className="text-xl font-bold text-gray-700 mb-2">กรุณาระบุตัวตน</h3>
                            <p className="text-gray-500 max-w-md">
                                กรุณากรอก <b>ชื่อ-นามสกุล</b>, <b>รหัสนักศึกษา</b> และ <b>ห้อง/แผนก</b> <br/>
                                ในกล่องข้อมูลด้านบนให้ครบถ้วน เพื่อค้นหาและแสดงประวัติการยืมของคุณ
                            </p>
                        </div>
                    );
                }
                
                const list = useMemo(() => {
                    let res = borrowings;
                    if (!isSimulatedAdmin) {
                        const filterName = borrowerName.trim().toLowerCase();
                        const filterId = studentId.trim().toLowerCase();

                        if (filterName || filterId) {
                            res = res.filter(b => {
                                const bName = (b.borrowerName || '').toLowerCase();
                                const bId = (b.studentId || '').toLowerCase();
                                const nameMatch = filterName && bName.includes(filterName);
                                const idMatch = filterId && bId.includes(filterId);
                                return nameMatch || idMatch;
                            });
                        } else {
                            // กรณีนี้จะไม่เกิดขึ้นแล้วเพราะมี check ด้านบน แต่ใส่กันไว้
                            res = res.filter(b => b.userId === userId); 
                        }
                    } else if (search) {
                        const lower = search.toLowerCase();
                        res = res.filter(b => 
                            b.userName?.toLowerCase().includes(lower) || 
                            b.equipmentName?.toLowerCase().includes(lower)
                        );
                    }
                    return res.sort((a,b) => new Date(b.borrowDate) - new Date(a.borrowDate));
                }, [borrowings, userId, isSimulatedAdmin, search, borrowerName, studentId]); 

                const handleClearHistory = () => {
                    const idsToDelete = list.map(b => b.id);
                    promptDeleteAllHistory(idsToDelete);
                };

                return (
                    <div className="space-y-6">
                        <div className="flex justify-between items-center flex-wrap gap-4">
                            <h2 className="text-2xl font-bold text-gray-800">
                                {isSimulatedAdmin ? 'ประวัติการยืมทั้งหมด' : 'ประวัติการยืม (Local Mode)'}
                            </h2>
                            {list.length > 0 && (
                                <button 
                                    onClick={handleClearHistory}
                                    className="flex items-center gap-2 px-3 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition-colors text-sm font-medium"
                                >
                                    <LucideTrash size={16} /> ล้างประวัติทั้งหมด
                                </button>
                            )}
                        </div>
                        
                        {isSimulatedAdmin && (
                            <div className="relative">
                                <LucideSearch className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={18} />
                                <input 
                                    type="text" 
                                    placeholder="ค้นหาตามชื่อ หรือ อุปกรณ์..." 
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full pl-10 p-2 border rounded-lg"
                                />
                            </div>
                        )}

                        <div className="space-y-3">
                            {list.length === 0 && <p className="text-center text-gray-500 py-8">ไม่พบประวัติการยืมที่ตรงกับข้อมูลของคุณ</p>}
                            {list.map(b => {
                                const isOverdue = b.status === 'อนุมัติ' && new Date(b.dueDate) < new Date();
                                return (
                                    <div key={b.id} className={`bg-white p-4 rounded-xl border shadow-sm flex flex-col md:flex-row justify-between gap-4 ${isOverdue ? 'border-red-200 bg-red-50' : ''}`}>
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <h3 className="font-bold text-gray-800">{b.equipmentName} ({b.quantity})</h3>
                                                <span className={`px-2 py-0.5 text-xs rounded-full border ${
                                                    b.status === 'อนุมัติ' ? 'bg-green-100 text-green-700 border-green-200' :
                                                    b.status === 'คืนแล้ว' ? 'bg-gray-100 text-gray-700 border-gray-200' :
                                                    b.status === 'รออนุมัติ' ? 'bg-yellow-100 text-yellow-700 border-yellow-200' :
                                                    'bg-red-100 text-red-700 border-red-200'
                                                }`}>{b.status}</span>
                                                {isOverdue && <span className="px-2 py-0.5 text-xs rounded-full bg-red-600 text-white animate-pulse">เกินกำหนด</span>}
                                            </div>
                                            <p className="text-sm text-gray-600">ผู้ยืม: {b.userName}</p>
                                            <div className="flex gap-4 text-xs text-gray-500 mt-2">
                                                <span>ยืม: {new Date(b.borrowDate).toLocaleDateString()}</span>
                                                <span>กำหนด: {new Date(b.dueDate).toLocaleString()}</span>
                                                {b.returnDate && <span className="text-green-600">คืน: {new Date(b.returnDate).toLocaleDateString()}</span>}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {!isSimulatedAdmin && b.status === 'อนุมัติ' && (
                                                <button 
                                                    onClick={() => signalReturn(b.id)}
                                                    className="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 whitespace-nowrap"
                                                >
                                                    แจ้งคืน
                                                </button>
                                            )}
                                            {/* Delete Button enabled for everyone */}
                                            <button 
                                                onClick={() => promptDeleteBorrowing(b.id)}
                                                className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                                title="ลบประวัติ"
                                            >
                                                <LucideTrash size={18} />
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const AdminUsersView = () => {
                const [searchTerm, setSearchTerm] = useState('');

                const filteredUsers = users.filter(u => 
                    u.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    u.studentId.toLowerCase().includes(searchTerm.toLowerCase())
                );

                return (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800">จัดการผู้ใช้งาน</h2>
                        
                        <div className="relative">
                            <LucideSearch className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={18} />
                            <input 
                                type="text" 
                                placeholder="ค้นหาชื่อ หรือ รหัสนักศึกษา..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full pl-10 p-2 border rounded-lg"
                            />
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border overflow-hidden overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-gray-50 text-gray-500 font-medium">
                                    <tr>
                                        <th className="p-4">ชื่อ-นามสกุล</th>
                                        <th className="p-4">รหัส</th>
                                        <th className="p-4">ห้อง/แผนก</th>
                                        <th className="p-4 text-center">สถานะ</th>
                                        <th className="p-4 text-center">สิทธิ์</th>
                                        <th className="p-4 text-center">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {filteredUsers.map(user => (
                                        <tr key={user.studentId} className={`hover:bg-gray-50 ${user.status === 'suspended' ? 'bg-red-50' : ''}`}>
                                            <td className="p-4 font-medium">{user.name}</td>
                                            <td className="p-4 text-gray-500">{user.studentId}</td>
                                            <td className="p-4 text-gray-500">{user.className}</td>
                                            <td className="p-4 text-center">
                                                <span className={`px-2 py-1 rounded-full text-xs font-semibold ${
                                                    user.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                                                }`}>
                                                    {user.status === 'active' ? 'ปกติ' : 'ถูกระงับ'}
                                                </span>
                                            </td>
                                            <td className="p-4 text-center">
                                                <span className={`flex items-center justify-center gap-1 text-xs ${
                                                    user.role === 'admin' ? 'text-purple-600 font-bold' : 'text-gray-600'
                                                }`}>
                                                    {user.role === 'admin' ? <Shield size={14}/> : <LucideUser size={14}/>}
                                                    {user.role === 'admin' ? 'ผู้ดูแล' : 'ผู้ยืม'}
                                                </span>
                                            </td>
                                            <td className="p-4 flex justify-center gap-2">
                                                <button 
                                                    onClick={() => toggleUserStatus(user.studentId)}
                                                    className={`p-2 rounded-lg transition-colors ${
                                                        user.status === 'active' 
                                                            ? 'text-red-500 hover:bg-red-100' 
                                                            : 'text-green-500 hover:bg-green-100'
                                                    }`}
                                                    title={user.status === 'active' ? "ระงับการใช้งาน" : "ยกเลิกการระงับ"}
                                                >
                                                    {user.status === 'active' ? <UserX size={18} /> : <UserCheck size={18} />}
                                                </button>
                                                <button 
                                                    onClick={() => toggleUserRole(user.studentId)}
                                                    className={`p-2 rounded-lg transition-colors ${
                                                        user.role === 'user' 
                                                            ? 'text-purple-500 hover:bg-purple-100' 
                                                            : 'text-gray-500 hover:bg-gray-100'
                                                    }`}
                                                    title={user.role === 'user' ? "ตั้งเป็นผู้ดูแล" : "ลดระดับเป็นผู้ยืม"}
                                                >
                                                    <ShieldAlert size={18} />
                                                </button>
                                                <button 
                                                    onClick={() => promptDeleteUser(user.studentId)}
                                                    className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                                    title="ลบผู้ใช้"
                                                >
                                                    <LucideTrash size={18} />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredUsers.length === 0 && (
                                        <tr>
                                            <td colSpan="6" className="p-8 text-center text-gray-400">ไม่พบข้อมูลผู้ใช้</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const AdminManageView = ({ onEdit }) => {
                const [tempConfig, setTempConfig] = useState(siteConfig);

                const handleDelete = async (id) => {
                    promptDeleteEquipment(id); 
                };

                const handleConfigBlur = () => {
                    if (tempConfig.title !== siteConfig.title || tempConfig.subtitle !== siteConfig.subtitle) {
                        updateSiteConfig(tempConfig);
                    }
                };

                const handleSaveConfig = (e) => {
                    e.preventDefault();
                    updateSiteConfig(tempConfig);
                    alert('บันทึกการตั้งค่าเรียบร้อย');
                };

                return (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800">จัดการระบบและอุปกรณ์</h2>

                        {/* System Settings Section with Auto-Save */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <LucideSettings size={20} className="text-blue-600" /> ตั้งค่าชื่อเว็บไซต์
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อระบบ (Title)</label>
                                    <input 
                                        className="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                        value={tempConfig.title} 
                                        onChange={e => setTempConfig({...tempConfig, title: e.target.value})}
                                        onBlur={handleConfigBlur}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">คำอธิบาย (Subtitle)</label>
                                    <input 
                                        className="w-full border p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                        value={tempConfig.subtitle} 
                                        onChange={e => setTempConfig({...tempConfig, subtitle: e.target.value})}
                                        onBlur={handleConfigBlur}
                                    />
                                </div>
                            </div>
                            <p className="text-xs text-gray-400 mt-2">* ระบบจะบันทึกอัตโนมัติเมื่อพิมพ์เสร็จ</p>
                        </div>

                        <div className="flex justify-between items-center pt-4 border-t">
                            <h3 className="text-lg font-bold text-gray-800">รายการอุปกรณ์</h3>
                            <div className="flex gap-2">
                                <button 
                                    onClick={resetData}
                                    className="px-3 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium flex items-center gap-1"
                                >
                                    <LucideDatabase size={14}/> รีเซ็ตข้อมูล
                                </button>
                                <button 
                                    onClick={() => onEdit({ id: 'new', name: '', type: 'แบบเรียน', quantity: 1, available: 1, description: '', imageUrl: '' })}
                                    className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium"
                                >
                                    + เพิ่มรายการ
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-gray-50 text-gray-500 font-medium">
                                    <tr>
                                        <th className="p-4">รูปภาพ</th>
                                        <th className="p-4">ชื่อ</th>
                                        <th className="p-4">ประเภท</th>
                                        <th className="p-4 text-center">คงเหลือ/ทั้งหมด</th>
                                        <th className="p-4 text-right">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {equipments.map(item => (
                                        <tr key={item.id} className="hover:bg-gray-50">
                                            <td className="p-4">
                                                <img 
                                                    src={item.imageUrl} 
                                                    alt={item.name} 
                                                    className="w-10 h-10 object-cover rounded bg-gray-100"
                                                    onError={(e) => e.target.src = 'https://placehold.co/100x100/e2e8f0/64748b?text=No+Img'}
                                                />
                                            </td>
                                            <td className="p-4 font-medium">{item.name}</td>
                                            <td className="p-4"><span className="px-2 py-1 bg-gray-100 rounded text-xs">{item.type}</span></td>
                                            <td className="p-4 text-center">
                                                <span className={item.available > 0 ? 'text-green-600 font-bold' : 'text-red-500'}>
                                                    {item.available}
                                                </span>
                                                <span className="text-gray-400"> / {item.quantity}</span>
                                            </td>
                                            <td className="p-4 text-right space-x-2">
                                                <button onClick={() => onEdit(item)} className="text-blue-600 hover:underline">แก้ไข</button>
                                                <button onClick={() => handleDelete(item.id)} className="text-red-600 hover:underline">ลบ</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            // --- New: Security & Logs View ---
            const AdminSecurityView = () => {
                const fileInputRef = useRef(null);

                const handleBackup = () => {
                    const data = {
                        equipments, borrowings, users, systemLogs: logs, siteConfig
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup-equipment-system-${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                    addLog('Backup', 'Admin', 'ดาวน์โหลดไฟล์สำรองข้อมูล');
                };

                const handleRestoreClick = () => {
                    fileInputRef.current.click();
                };

                const handleFileChange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (confirm('คำเตือน: การกู้คืนข้อมูลจะทับข้อมูลปัจจุบันทั้งหมด คุณแน่ใจหรือไม่?')) {
                                if(data.equipments) saveToLocal('equipments', data.equipments);
                                if(data.borrowings) saveToLocal('borrowings', data.borrowings);
                                if(data.users) saveToLocal('users', data.users);
                                if(data.systemLogs) saveToLocal('systemLogs', data.systemLogs);
                                if(data.siteConfig) saveToLocal('siteConfig', data.siteConfig);
                                alert('กู้คืนข้อมูลสำเร็จ! ระบบจะรีโหลด');
                                window.location.reload();
                            }
                        } catch (err) {
                            alert('ไฟล์ไม่ถูกต้อง กรุณาใช้ไฟล์ JSON ที่ได้จากการ Backup เท่านั้น');
                        }
                    };
                    reader.readAsText(file);
                };

                return (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800">ความปลอดภัยและบันทึก</h2>

                        {/* Backup & Restore */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-100">
                                <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
                                    <DatabaseIcon size={20} className="text-blue-600"/> สำรองข้อมูล (Backup)
                                </h3>
                                <p className="text-sm text-gray-600 mb-4">ดาวน์โหลดข้อมูลทั้งหมดในระบบเก็บไว้เป็นไฟล์ .json</p>
                                <button onClick={handleBackup} className="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2">
                                    <Download size={18}/> ดาวน์โหลด Backup
                                </button>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-orange-100">
                                <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
                                    <Upload size={20} className="text-orange-600"/> กู้คืนข้อมูล (Restore)
                                </h3>
                                <p className="text-sm text-gray-600 mb-4">อัปโหลดไฟล์ Backup เพื่อกู้คืนข้อมูล (ข้อมูลปัจจุบันจะถูกทับ)</p>
                                <input type="file" ref={fileInputRef} onChange={handleFileChange} className="hidden" accept=".json" />
                                <button onClick={handleRestoreClick} className="w-full py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 flex items-center justify-center gap-2">
                                    <Upload size={18}/> อัปโหลดไฟล์กู้คืน
                                </button>
                            </div>
                        </div>

                        {/* Logs Table */}
                        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <h3 className="font-bold text-gray-700 flex items-center gap-2">
                                    <FileText size={18}/> บันทึกการใช้งาน (System Logs)
                                </h3>
                                <div className="flex items-center gap-2">
                                    <span className="text-xs text-gray-500">แสดง 200 รายการล่าสุด</span>
                                    {logs.length > 0 && (
                                        <button 
                                            onClick={promptClearLogs}
                                            className="p-1.5 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                            title="ล้างบันทึกทั้งหมด"
                                        >
                                            <LucideTrash size={16} />
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="overflow-x-auto max-h-[500px]">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-100 text-gray-600 sticky top-0">
                                        <tr>
                                            <th className="p-3">เวลา</th>
                                            <th className="p-3">ผู้ทำรายการ</th>
                                            <th className="p-3">กิจกรรม</th>
                                            <th className="p-3">รายละเอียด</th>
                                            <th className="p-3 text-right">จัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {logs.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-gray-400">ยังไม่มีบันทึก</td></tr>
                                        )}
                                        {logs.map(log => (
                                            <tr key={log.id} className="hover:bg-gray-50">
                                                <td className="p-3 text-gray-500 whitespace-nowrap">
                                                    {new Date(log.timestamp).toLocaleString()}
                                                </td>
                                                <td className="p-3 font-medium">{log.actor}</td>
                                                <td className="p-3">
                                                    <span className="px-2 py-1 bg-gray-100 rounded-md text-xs border border-gray-200">
                                                        {log.action}
                                                    </span>
                                                </td>
                                                <td className="p-3 text-gray-600">{log.details}</td>
                                                <td className="p-3 text-right">
                                                    <button 
                                                        onClick={() => promptDeleteLog(log.id)}
                                                        className="p-1 text-gray-400 hover:text-red-500 rounded transition-colors"
                                                        title="ลบรายการนี้"
                                                    >
                                                        <LucideTrash size={14} />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };
            const DatabaseIcon = LucideDatabase; 

            const AdminApproveView = () => {
                const pending = borrowings.filter(b => b.status === 'รออนุมัติ' || b.status === 'รอการตรวจสอบคืน');

                return (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800">อนุมัติ / ตรวจรับคืน</h2>
                        {pending.length === 0 && <p className="text-gray-500 text-center py-8">ไม่มีรายการรอดำเนินการ</p>}
                        
                        <div className="grid gap-4">
                            {pending.map(b => (
                                <div key={b.id} className="bg-white p-4 rounded-xl shadow-sm border border-l-4 border-l-blue-500 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <div>
                                        <div className="flex items-center gap-2">
                                            <h3 className="font-bold text-gray-800">{b.equipmentName} ({b.quantity})</h3>
                                            <span className="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded-full">{b.status}</span>
                                        </div>
                                        <p className="text-sm text-gray-600 mt-1">ผู้ยืม: <span className="font-semibold">{b.userName}</span></p>
                                        <p className="text-xs text-gray-400 mt-1">วันที่ยืม: {new Date(b.borrowDate).toLocaleDateString()}</p>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        {b.status === 'รออนุมัติ' ? (
                                            <>
                                                <button onClick={() => approveBorrow(b.id, b.equipmentId, b.quantity)} className="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">อนุมัติ</button>
                                                <button onClick={() => cancelBorrow(b.id)} className="px-4 py-2 bg-red-100 text-red-600 text-sm rounded-lg hover:bg-red-200">ปฏิเสธ</button>
                                            </>
                                        ) : (
